<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Tryd Server Status</title>
    <style>
        :root {
            --brand-glow: #0083bb;
            --success: #10b981;
            --font-main: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: transparent;
            font-family: var(--font-main);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            padding: 0;
        }

        .widget-container {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #151820 0%, #0c0e12 100%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Ambient background glow */
        .widget-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(0, 131, 187, 0.15) 0%, transparent 60%);
            pointer-events: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            z-index: 2;
        }

        .title {
            font-size: 13px;
            font-weight: 600;
            color: #d1d5db;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            color: var(--success);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: var(--success);
            border-radius: 50%;
            position: relative;
        }

        .pulse-dot::after {
            content: '';
            position: absolute;
            inset: -4px;
            background-color: var(--success);
            border-radius: 50%;
            opacity: 0.4;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.5); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .visualization-area {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        /* Radar rings */
        .radar {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 1px solid rgba(0, 131, 187, 0.1);
            pointer-events: none;
        }
        .radar:nth-child(2) { width: 140px; height: 140px; }
        .radar:nth-child(3) { width: 80px; height: 80px; border-color: rgba(0, 131, 187, 0.2); }

        .nodes-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
            width: 100%;
            position: relative;
            z-index: 5;
        }

        .node {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .node-icon {
            width: 56px;
            height: 56px;
            background: #1b2028;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5), inset 0 2px 5px rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .node-icon.tryd {
            border-color: rgba(0, 131, 187, 0.4);
            box-shadow: 0 0 20px rgba(0, 131, 187, 0.2), inset 0 2px 5px rgba(255, 255, 255, 0.05);
        }

        .node-icon.b3 {
            border-color: rgba(253, 200, 47, 0.4);
            box-shadow: 0 0 20px rgba(253, 200, 47, 0.1), inset 0 2px 5px rgba(255, 255, 255, 0.05);
        }

        .node-label {
            font-size: 11px;
            font-weight: 600;
            color: #9cb3c9;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Server inner SVGs */
        .server-svg {
            width: 28px;
            height: 28px;
            fill: none;
            stroke: #fff;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .tryd .server-svg { stroke: #3794fa; }
        .b3 .server-svg { stroke: #fdc82f; }

        /* Connection line */
        .connection {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 0;
            display: flex;
            align-items: center;
        }

        .packet {
            width: 16px;
            height: 2px;
            background: #00e000;
            box-shadow: 0 0 10px 2px #00e000;
            border-radius: 4px;
            position: absolute;
            left: 0;
            opacity: 0;
        }

        .packet.p1 { animation: shoot 1s infinite cubic-bezier(0.4, 0, 0.2, 1); }
        .packet.p2 { animation: shoot 1.2s infinite cubic-bezier(0.4, 0, 0.2, 1); animation-delay: 0.4s; background: #3794fa; box-shadow: 0 0 10px 2px #3794fa;}

        @keyframes shoot {
            0% { left: 0; opacity: 1; transform: scaleX(1); }
            50% { transform: scaleX(2); }
            100% { left: 100%; opacity: 0; transform: scaleX(1); }
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            z-index: 2;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-lbl {
            font-size: 10px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-val {
            font-family: var(--font-main);
            font-variant-numeric: tabular-nums;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: baseline;
            gap: 2px;
        }

        .stat-val span {
            font-size: 11px;
            color: #9ca3af;
            font-family: var(--font-main);
            font-weight: 500;
        }

        .ping-val {
            color: #3794fa;
            text-shadow: 0 0 10px rgba(55, 148, 250, 0.4);
        }

    </style>
</head>
<body>

    <div class="widget-container">
        <div class="header">
            <div class="title">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2"><path d="M21 12a9 9 0 0 1-9 9m9-9a9 9 0 0 0-9-9m9 9H3m9 9a9 9 0 0 1-9-9m9 9c1.66 0 3-4.03 3-9s-1.34-9-3-9m0 18c-1.66 0-3-4.03-3-9s1.34-9 3-9m-9 9a9 9 0 0 1 9-9"/></svg>
                Monitor de Conexão Local
            </div>
            <div class="status-badge">
                <div class="pulse-dot"></div>
                SLA 99.9%
            </div>
        </div>

        <div class="visualization-area">
            <div class="radar"></div>
            <div class="radar"></div>
            <div class="radar"></div>

            <div class="nodes-container">
                <div class="node">
                    <div class="node-icon tryd">
                        <svg class="server-svg" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line></svg>
                    </div>
                    <div class="node-label">Terminal Tryd</div>
                </div>

                <div class="connection">
                    <div class="packet p1"></div>
                    <div class="packet p2"></div>
                </div>

                <div class="node">
                    <div class="node-icon b3">
                        <svg class="server-svg" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5"></path><path d="M2 12l10 5 10-5"></path></svg>
                    </div>
                    <div class="node-label">Servidores B3</div>
                </div>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-lbl">Uptime</div>
                <div class="stat-val">99.9<span>%</span></div>
            </div>
            <div class="stat-item">
                <div class="stat-lbl">Latência Média</div>
                <div class="stat-val ping-val" id="ping-display">3<span>ms</span></div>
            </div>
            <div class="stat-item">
                <div class="stat-lbl">Pacotes Perdidos</div>
                <div class="stat-val">0.00<span>%</span></div>
            </div>
        </div>
    </div>

    <script>
        const pingDisplay = document.getElementById('ping-display');
        
        // Simulate minor ping fluctuations
        setInterval(() => {
            const basePing = 3;
            // 70% chance to be 3, 20% to be 4, 10% to be 2
            const rand = Math.random();
            let currentPing = basePing;
            if (rand > 0.9) currentPing = 2;
            else if (rand > 0.7) currentPing = 4;
            else if (rand > 0.98) currentPing = 5;

            pingDisplay.innerHTML = `${currentPing}<span>ms</span>`;
        }, 1200);
    </script>
</body>
</html>
