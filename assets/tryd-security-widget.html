<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Tryd Security Monitor</title>
    <style>
        :root {
            --brand-glow: #0083bb;
            --success: #10b981;
            --font-main: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: transparent;
            font-family: var(--font-main);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            background: transparent;
            position: relative;
        }

        .widget-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        /* Ambient glow */
        .widget-container::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle at center, rgba(0, 131, 187, 0.15) 0%, transparent 60%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            border-radius: 50%;
        }

        /* Scanning Rings */
        .scanner-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px solid rgba(0, 131, 187, 0.15);
            animation: pulse-ring 4s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
            pointer-events: none;
        }
        
        .scanner-ring:nth-child(2) { animation-delay: -1s; }
        .scanner-ring:nth-child(3) { animation-delay: -2s; }
        .scanner-ring:nth-child(4) { animation-delay: -3s; }

        @keyframes pulse-ring {
            0% { width: 100px; height: 100px; opacity: 1; border-color: rgba(255, 255, 255, 0.1); }
            50% { border-color: rgba(0, 131, 187, 0.3); }
            100% { width: 500px; height: 500px; opacity: 0; border-color: rgba(0, 131, 187, 0); }
        }

        .shield-core {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            background: transparent;
            box-shadow: 0 0 30px rgba(0, 131, 187, 0.4);
        }

        /* Spinning Gradient Border */
        .shield-core::before {
            content: '';
            position: absolute;
            inset: -2px; /* Border thickness */
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                rgba(0,131,187,0) 0%,
                rgba(100,200,255,0.8) 15%,
                rgba(220,245,255,1) 25%,
                rgba(100,200,255,0.8) 35%,
                rgba(0,131,187,0) 50%,
                rgba(0,80,150,0.2) 75%,
                rgba(0,131,187,0) 100%
            );
            animation: spin-border 2.5s linear infinite;
            z-index: -2;
        }

        /* Inner Dark Circle */
        .shield-core::after {
            content: '';
            position: absolute;
            inset: 2px;
            border-radius: 50%;
            background: rgba(4, 8, 16, 0.95);
            box-shadow: inset 0 0 20px rgba(0, 131, 187, 0.25);
            z-index: -1;
        }

        @keyframes spin-border {
            to { transform: rotate(360deg); }
        }

        .shield-icon {
            width: 40px;
            height: 40px;
            stroke: #96c8ff;
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(-3px); }
            50% { transform: translateY(3px); filter: drop-shadow(0 0 8px #96c8ff); }
            100% { transform: translateY(-3px); }
        }

        /* Orbiting Packets removed */
        
        /* Labels removed */
    </style>
</head>
<body>

    <div class="widget-container">
        
        <div class="scanner-ring"></div>
        <div class="scanner-ring"></div>
        <div class="scanner-ring"></div>
        <div class="scanner-ring"></div>

        <!-- Orbits removed -->

        <div class="shield-core">
            <svg class="shield-icon" viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        </div>

    </div>

</body>
</html>
